services:
  - type: web
    name: insightledger-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: EMBEDDING_DEVICE
        value: cpu
